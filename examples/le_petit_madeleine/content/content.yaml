getting_here:
  by_plane:
    en: Nice Côte d'Azur Airport is 6 km away. Take tram T2 to Jean Médecin, then T1 to Opéra-Vieille Ville (~20 min, €1.70). Taxi ~15 min, ~€35.
    fr: L'aéroport de Nice Côte d'Azur est à 6 km. Prenez le tram T2 jusqu'à Jean Médecin, puis T1 jusqu'à Opéra-Vieille Ville (~20 min, 1,70 €). Taxi ~15 min, ~35 €.
  by_train:
    en: Nice-Ville station is a 15-minute walk or 5-minute taxi from the hotel. Trains from Paris (5.5h TGV), Lyon (4h), and Marseille (2.5h).
    fr: La gare de Nice-Ville est à 15 minutes à pied ou 5 minutes en taxi. Trains depuis Paris (5h30 TGV), Lyon (4h) et Marseille (2h30).
  by_car:
    en: From the A8 motorway, exit at Nice-Est and follow signs for the Promenade des Anglais. Free street parking on Rue de la Liberté.
    fr: Depuis l'autoroute A8, sortez à Nice-Est et suivez les panneaux vers la Promenade des Anglais. Stationnement gratuit en voirie rue de la Liberté.
