name:
  en: Deluxe Sea View
  fr: Chambre Deluxe Vue Mer

description:
  en: >
    Spacious rooms on the second floor with unobstructed views of the
    Mediterranean. Feature a king bed, original parquet flooring, and a
    private balcony perfect for morning coffee as the sun rises over the bay.
  fr: >
    Chambres spacieuses au deuxième étage avec vue imprenable sur la
    Méditerranée. Lit king-size, parquet d'origine et balcon privé
    idéal pour prendre le café du matin au lever du soleil sur la baie.

